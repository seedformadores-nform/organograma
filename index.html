        const PersonCard = ({ person, color, searchTerm, onClick }) => {
            const matches = searchTerm && (person.name.toLowerCase().includes(searchTerm.toLowerCase()) || person.role.toLowerCase().includes(searchTerm.toLowerCase()));

            return (
                <div className="min-h-screen p-6 md:p-12 print:bg-white print:p-4">
                    <Modal person={selectedPerson} color={selectedColor} onClose={() => setSelectedPerson(null)} />
                    <div className="max-w-[1600px] mx-auto mb-12 flex flex-col lg:flex-row lg:items-end justify-between gap-8 border-b border-slate-300 pb-10 no-print">
                        <div><img src="https://lh3.googleusercontent.com/d/1TTrUveR7q0bHVMk9q8t6mzhP9fdBys7b" alt="Logo" className="h-24 md:h-28 w-auto object-contain" /></div>
                        <div className="flex flex-wrap items-center gap-6">
                            <div className="relative group">
                                <div className="absolute left-5 top-1/2 -translate-y-1/2 w-6 h-6 text-slate-400"><IconSearch /></div>
                                <input type="text" placeholder="Pesquisar..." className="pl-14 pr-8 py-4 bg-white border-2 border-slate-200 rounded-3xl w-96 focus:border-pink-400 outline-none shadow-lg transition-all text-slate-700 text-lg font-semibold" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="flex bg-white rounded-3xl border-2 border-slate-200 p-2 shadow-lg">
                                    <button onClick={() => setZoom(Math.max(zoom - 0.1, 0.4))} className="p-3 hover:bg-slate-50 rounded-2xl"><IconZoomOut /></button>
                                    <button onClick={() => setZoom(1)} className="p-3 font-black text-xs text-slate-400 px-5 uppercase">100%</button>
                                    <button onClick={() => setZoom(Math.min(zoom + 0.1, 1.5))} className="p-3 hover:bg-slate-50 rounded-2xl"><IconZoomIn /></button>
                                </div>
                                <button onClick={handlePrint} className="p-5 bg-slate-900 text-white rounded-3xl shadow-xl hover:bg-slate-800 active:scale-95 group"><IconPrinter /></button>
                            </div>
                        </div>
                    </div>
                    <div style={{ transform: `scale(${zoom})`, transformOrigin: 'top center' }} className="max-w-[1600px] mx-auto w-full print-full">
                        <div className="flex flex-col items-center mb-24 relative">
                            <div style={{ borderTop: `10px solid ${COLORS.purple}` }} className="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-200 text-center w-[450px] relative z-10 cursor-pointer print:shadow-none print:border-t-4" onClick={() => handleSelect(initialData.chief, COLORS.purple)}>
                                <div className="w-36 h-36 rounded-full border-8 border-white shadow-xl overflow-hidden mx-auto -mt-24 mb-6">
                                    <img src={initialData.chief.photoUrl} alt="Gilmara" className="w-full h-full object-cover" style={{ objectPosition: initialData.chief.objectPosition }} />
                                </div>
                                <h1 className="text-4xl font-black text-slate-900 uppercase tracking-tighter leading-none">{initialData.chief.name}</h1>
                                <p className="text-lg font-black text-purple-600 uppercase tracking-widest mt-2">{initialData.chief.role}</p>
                                <div className="mt-10 flex flex-col gap-3 border-t border-slate-100 pt-8 text-left" onClick={(e) => e.stopPropagation()}>
                                    <span className="text-xs font-black text-slate-300 uppercase tracking-[0.3em] text-center block mb-4">Núcleo de Assessoria</span>
                                    <div className="grid grid-cols-1 gap-3">
                                        {initialData.chief.staff.map(person => <PersonCard key={person.id} person={person} color={COLORS.purple} searchTerm={searchTerm} onClick={handleSelect} />)}
                                    </div>
                                </div>
                            </div>
                            <div className="absolute top-full h-24 w-1.5 bg-slate-200 left-1/2 -translate-x-1/2 no-print" />
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-12 relative items-start justify-items-center print:block">
                            <div className="hidden md:block absolute -top-12 left-[16.6%] right-[16.6%] h-1.5 bg-slate-200 no-print" />
                            {initialData.coordinations.map(coord => (
                                <div key={coord.id} className="relative flex justify-center w-full print:block print:mb-12">
                                    <div className="hidden md:block absolute -top-12 left-1/2 -translate-x-1/2 h-12 w-1.5 bg-slate-200 no-print" />
                                    <CoordinationColumn coord={coord} searchTerm={searchTerm} onSelect={handleSelect} />
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
